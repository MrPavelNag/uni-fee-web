name: Solidity Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  forge-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Run Solidity tests
        run: forge test -vv
